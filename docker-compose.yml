services:
  hidratespark-mqtt-bridge:
    image: ghcr.io/loryanstrant/hidratespark-mqtt-bridge:latest
    container_name: hidratespark-mqtt-bridge
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - apparmor=unconfined
    volumes:
      - ./config:/config
      - /var/run/dbus:/var/run/dbus
    restart: unless-stopped
    environment:
      - CONFIG_PATH=/config/config.yaml
      - WEB_PORT=8080
      - TZ=Australia/Melbourne
